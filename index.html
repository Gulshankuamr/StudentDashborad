<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- App Title -->
    <title>School Dashboard - Student Portal</title>

    <!-- SEO Meta -->
    <meta
      name="description"
      content="Student Dashboard - Manage your classes, assignments, attendance, and grades efficiently."
    />
    <meta name="author" content="School Management System" />

    <!-- Open Graph / Facebook -->
    <meta property="og:title" content="School Dashboard - Student Portal" />
    <meta
      property="og:description"
      content="Access your school dashboard to view classes, assignments, attendance, and grades."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="School Dashboard - Student Portal" />
    <meta
      name="twitter:description"
      content="Check your student dashboard for classes, grades, and announcements."
    />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- Favicon (optional) -->
    <link rel="icon" href="/favicon.ico" />
  </head>

  <body class="bg-background text-foreground">
    <!-- React Mount Point -->
    <div id="root"></div>

    <!-- React Entry -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
